<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Pagamento Confirmado</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1a1c2c, #2e2f4f);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }

      .box {
        background: rgba(255, 255, 255, 0.05);
        padding: 40px;
        border-radius: 12px;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      }

      h1 {
        color: #22c55e;
        margin-bottom: 20px;
      }

      p {
        font-size: 16px;
        margin-bottom: 10px;
      }

      .info {
        margin-top: 20px;
        padding: 15px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 8px;
      }

      .btn {
        margin-top: 25px;
        display: inline-block;
        padding: 12px 20px;
        background: #22c55e;
        color: #000;
        font-weight: bold;
        border-radius: 6px;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h1>🎉 Pagamento Confirmado!</h1>

      <p>Obrigado pela sua confiança.</p>
      <p>Seu acesso está sendo preparado.</p>

      <div class="info">
        <p><strong>📩 Você receberá seus dados de acesso em breve.</strong></p>
        <p>Prazo médio: até alguns minutos.</p>
      </div>

      <a href="index.html" class="btn">Voltar ao início</a>
    </div>
  </body>
</html>
