<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Painel Admin - SCFP</title>

    <!-- CSS do sistema -->
    <link rel="stylesheet" href="css/admin.css" />

    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  </head>

  <body>
    <div class="overlay">
      <div class="loginCard">
        <!-- Logo -->
        <div class="logoSistemaLogin">
          <svg
            class="iconeTitulo"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="#10b981"
          >
            <path
              d="M12 2L2 7v2h20V7L12 2zm-7 9v7h2v-7H5zm4 0v7h2v-7H9zm4 0v7h2v-7h-2zm4 0v7h2v-7h-2zM2 20h20v2H2z"
            />
          </svg>
        </div>

        <!-- Títulos -->
        <div class="tituloSistema">
          <div class="tituloPrincipal">Admin SCFP</div>
          <div class="tituloSecundario">Controle de usuários</div>
        </div>

        <!-- Input -->
        <input id="novoEmail" placeholder="Email do usuário" />

        <!-- Botão -->
        <button onclick="criarUsuario()">Criar usuário</button>

        <!-- Resultado -->
        <div id="resultado"></div>
        <h2 style="margin-top: 20px">Usuários criados</h2>
        <input
          type="text"
          id="buscaUsuario"
          placeholder="🔍 Buscar por email..."
          oninput="filtrarUsuarios()"
        />
        <div id="listaUsuarios" class="lista-usuarios"></div>
      </div>
    </div>

    <!-- JS DO PAINEL -->
    <script src="js/alertas.js"></script>
    <script src="js/admin.js"></script>

    <!-- 🔹 POPUP AVISO -->
    <div id="popupAviso" class="popupAviso" style="display: none">
      <div class="popupBox">
        <h3>⚠ Atenção</h3>

        <p id="mensagemAviso"></p>

        <div class="acoesExcluir">
          <button onclick="fecharAviso()" style="width: 100%">OK</button>
        </div>
      </div>
    </div>

    <!-- 🔹 POPUP CONFIRMAÇÃO -->
    <div id="popupConfirmar" class="popupAviso" style="display: none">
      <div class="popupBox">
        <h3>⚠ Confirmação</h3>

        <p id="mensagemConfirmar"></p>

        <div style="display: flex; gap: 10px">
          <button
            onclick="confirmarAcao()"
            style="flex: 1; background: #10b981"
          >
            Confirmar
          </button>

          <button
            onclick="fecharConfirmacao()"
            style="flex: 1; background: #e53935"
          >
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <!-- 🔹 POPUP EDITAR -->
    <div id="popupEditar" class="popupAviso" style="display: none">
      <div class="popupBox">
        <h3>✏ Editar usuário</h3>

        <input
          type="text"
          id="inputEditarEmail"
          placeholder="Novo email"
          style="width: 100%; padding: 10px; margin: 10px 0"
        />

        <div style="display: flex; gap: 10px">
          <button onclick="salvarEdicao()" style="flex: 1; background: #10b981">
            Salvar
          </button>

          <button onclick="fecharEditar()" style="flex: 1; background: #e53935">
            Cancelar
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
