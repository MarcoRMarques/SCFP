<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css" />

    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  </head>

  <body>
    <div class="overlay">
      <div class="loginCard">
        <h2>Login</h2>

        <input
          type="email"
          id="email"
          placeholder="Email"
          autocomplete="email"
        />
        <input type="password" id="senha" placeholder="Senha" />

        <button onclick="fazerLogin()">Entrar</button>
        <button onclick="recuperarSenha()">Esqueci minha senha</button>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://rjiydewkobfbevzfrxbz.supabase.co";

      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqaXlkZXdrb2JmYmV2emZyeGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODEyOTksImV4cCI6MjA4OTA1NzI5OX0.QvooykPpjtAptqIYG2cIsnTv7yZeNyNFQ5QirgaKeQ8";

      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
        {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
          },
        },
      );

      (async () => {
        const hash = window.location.hash;

        if (hash.includes("access_token")) {
          const { data, error } = await supabaseClient.auth.getSession();

          if (error) {
            alert("Erro ao validar recuperação: " + error.message);
            return;
          }

          const card = document.querySelector(".loginCard");

          if (card) {
            card.innerHTML = `
        <h2>Nova senha</h2>
        <input type="password" id="novaSenha" placeholder="Nova senha" />
        <button onclick="atualizarSenha()">Atualizar senha</button>
      `;
          }
        }
      })();

      if (window.location.href.includes("access_token")) {
        window.history.replaceState({}, document.title, "/SCFP/login.html");
      }

      async function fazerLogin() {
        const email = document.getElementById("email").value;
        const senha = document.getElementById("senha").value;

        if (!email || !senha) {
          alert("Informe email e senha");
          return;
        }

        const { error } = await supabaseClient.auth.signInWithPassword({
          email,
          password: senha,
        });

        if (error) {
          alert("Login inválido");
          return;
        }

        window.location.href = "/SCFP/index.html";
      }

      async function recuperarSenha() {
        const email = document.getElementById("email").value;

        if (!email) {
          alert("Digite seu email");
          return;
        }

        const { error } = await supabaseClient.auth.resetPasswordForEmail(
          email,
          {
            redirectTo: "https://marcormarques.github.io/SCFP/login.html",
          },
        );

        if (error) {
          alert("Erro: " + error.message);
          return;
        }

        alert("Email enviado!");
      }

      async function atualizarSenha() {
        const novaSenha = document.getElementById("novaSenha").value;

        if (!novaSenha) {
          alert("Digite a nova senha");
          return;
        }

        const { error } = await supabaseClient.auth.updateUser({
          password: novaSenha,
        });

        if (error) {
          alert("Erro: " + error.message);
          return;
        }

        alert("Senha atualizada!");
        window.location.href = "/SCFP/login.html";
      }
    </script>
  </body>
</html>
