<script>
  const SUPABASE_URL = "https://rjiydewkobfbevzfrxbz.supabase.co";

  const SUPABASE_ANON_KEY =
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqaXlkZXdrb2JmYmV2emZyeGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODEyOTksImV4cCI6MjA4OTA1NzI5OX0.QvooykPpjtAptqIYG2cIsnTv7yZeNyNFQ5QirgaKeQ8";

  const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY,
  );

  // 🔥 CORREÇÃO DO RECOVERY (AGORA FUNCIONA)
  (async () => {
    const params = new URLSearchParams(window.location.hash.substring(1));

    if (params.get("type") === "recovery") {
      const access_token = params.get("access_token");

      if (access_token) {
        await supabaseClient.auth.exchangeCodeForSession(window.location.href);

        // mostra tela de nova senha
        document.querySelector(".loginCard").innerHTML = `
        <h2>Nova senha</h2>
        <input type="password" id="novaSenha" placeholder="Nova senha" />
        <button onclick="atualizarSenha()">Atualizar senha</button>
      `;
      }
    }
  })();

  // limpa URL
  if (window.location.href.includes("access_token")) {
    window.history.replaceState({}, document.title, "/SCFP/login.html");
  }

  async function fazerLogin() {
    const email = document.querySelector("input[type=email]").value;
    const senha = document.querySelector("input[type=password]").value;

    if (!email || !senha) {
      alert("Informe email e senha");
      return;
    }

    const { error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: senha,
    });

    if (error) {
      alert("Login inválido");
      return;
    }

    window.location.href = "/SCFP/index.html";
  }

  async function recuperarSenha() {
    const email = document.getElementById("email").value;

    if (!email) {
      alert("Digite seu email para recuperar a senha");
      return;
    }

    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: "https://marcormarques.github.io/SCFP/login.html",
    });

    if (error) {
      alert("Erro: " + error.message);
      console.log(error);
      return;
    }

    alert("Email de recuperação enviado!");
  }

  async function atualizarSenha() {
    const novaSenha = document.getElementById("novaSenha").value;

    if (!novaSenha) {
      alert("Digite a nova senha");
      return;
    }

    const { error } = await supabaseClient.auth.updateUser({
      password: novaSenha,
    });

    if (error) {
      alert("Erro: " + error.message);
      return;
    }

    alert("Senha atualizada com sucesso!");
    window.location.href = "/SCFP/login.html";
  }
</script>
