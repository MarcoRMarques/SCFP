<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css" />

    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  </head>

  <body>
    <div class="overlay">
      <div class="loginCard">
        <h2>Login</h2>

        <input
          type="email"
          id="email"
          placeholder="Email"
          autocomplete="email"
        />
        <input type="password" id="senha" placeholder="Senha" />

        <button onclick="fazerLogin()">Entrar</button>
        <button class="btn-recuperar" onclick="recuperarSenha()">
          Esqueci minha senha
        </button>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://rjiydewkobfbevzfrxbz.supabase.co";

      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqaXlkZXdrb2JmYmV2emZyeGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODEyOTksImV4cCI6MjA4OTA1NzI5OX0.QvooykPpjtAptqIYG2cIsnTv7yZeNyNFQ5QirgaKeQ8";

      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
        {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
          },
        },
      );

      (async () => {
        const hash = window.location.hash;

        if (hash && hash.includes("access_token")) {
          // 🔥 Supabase já processa automaticamente o token
          const { data, error } = await supabaseClient.auth.getSession();

          if (error || !data.session) {
            mostrarAviso("Link inválido ou expirado. Solicite novamente.");
            return;
          }

          const card = document.querySelector(".loginCard");

          if (card) {
            card.innerHTML = `
        <h2>Nova senha</h2>
        <input type="password" id="novaSenha" placeholder="Nova senha" />
        <button onclick="atualizarSenha()">Atualizar senha</button>
      `;
          }
        }
      })();

      async function fazerLogin() {
        const email = document.getElementById("email").value;
        const senha = document.getElementById("senha").value;

        if (!email || !senha) {
          mostrarAviso("Informe email e senha");
          return;
        }

        const { error } = await supabaseClient.auth.signInWithPassword({
          email,
          password: senha,
        });

        if (error) {
          mostrarAviso("Email ou senha inválidos");
          return;
        }

        window.location.href = "index.html";
      }

      async function recuperarSenha() {
        const email = document.getElementById("email").value;

        if (!email) {
          mostrarAviso("Digite seu email");
          return;
        }

        const { error } = await supabaseClient.auth.resetPasswordForEmail(
          email,
          {
            redirectTo: "https://marcormarques.github.io/SCFP/login.html",
          },
        );

        if (error) {
          mostrarAviso("Erro ao enviar email. Verifique o endereço.");
          return;
        }

        mostrarAviso("Email enviado!");
      }

      async function atualizarSenha() {
        const novaSenha = document.getElementById("novaSenha").value;

        if (!novaSenha) {
          mostrarAviso("Digite a nova senha");
          return;
        }

        const { error } = await supabaseClient.auth.updateUser({
          password: novaSenha,
        });

        if (error) {
          mostrarAviso("Não foi possível atualizar a senha. Tente novamente.");
          return;
        }

        mostrarAviso("Senha atualizada com sucesso!");

        // espera 2 segundos antes de redirecionar
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      }

      function mostrarAviso(msg) {
        const popup = document.getElementById("popupAviso");
        const texto = document.getElementById("popupMensagem");

        texto.innerText = msg;
        popup.classList.remove("hidden");

        // 🔥 foco automático no botão
        setTimeout(() => {
          popup.querySelector("button").focus();
        }, 100);
      }

      function fecharPopup() {
        document.getElementById("popupAviso").classList.add("hidden");

        // 🔥 foco automático no email atualizado
        const emailInput = document.getElementById("email");
        if (emailInput) emailInput.focus();
      }

      window.onload = () => {
        const email = document.getElementById("email");
        const senha = document.getElementById("senha");
        const novaSenha = document.getElementById("novaSenha");

        if (novaSenha) {
          novaSenha.focus();
        } else if (email && !email.value) {
          email.focus();
        } else if (senha) {
          senha.focus();
        }
      };
    </script>

    <div id="popupAviso" class="popupAviso hidden">
      <div class="popupBox">
        <p id="popupMensagem"></p>
        <button onclick="fecharPopup()">OK</button>
      </div>
    </div>
  </body>
</html>
