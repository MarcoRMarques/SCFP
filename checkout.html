<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finalizar Compra - SCFP</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/vendas.css" />
  </head>

  <body class="pagina-vendas">
    <section class="container">
      <h1 style="text-align: center">Finalize sua assinatura</h1>

      <!-- FORM -->
      <div class="card">
        <input type="text" id="nome" placeholder="Seu nome completo" />
        <input type="text" id="cpf" placeholder="Seu CPF" />
        <input type="email" id="email" placeholder="Seu e-mail" />
        <input type="text" id="whatsapp" placeholder="Seu WhatsApp" />

        <select id="plano">
          <option value="">Selecione o plano</option>
          <option value="mensal">Plano Mensal</option>
          <option value="anual">Plano Anual</option>
        </select>

        <input type="text" id="cupom" placeholder="Cupom (opcional)" />

        <div style="margin-top: 15px">
          <input type="checkbox" id="aceite" />
          <label> Li e concordo com os termos de uso </label>
        </div>

        <button class="botao-cta" onclick="gerarPagamento()">
          GERAR PAGAMENTO PIX
        </button>
      </div>

      <!-- VÍDEO -->
      <div class="card" style="margin-top: 30px">
        <h3>Veja como funciona</h3>

        <div class="video-container">
          <iframe
            src="https://www.youtube.com/embed/0VTCdskRFvU"
            frameborder="0"
            allowfullscreen
          >
          </iframe>
        </div>
      </div>

      <!-- PIX -->
      <div
        id="pix-area"
        style="display: none; text-align: center; margin-top: 30px"
      >
        <h3>Pagamento via PIX</h3>

        <img src="img/ui/qrcode-pix.png" width="200" />

        <p>Após o pagamento, clique abaixo:</p>

        <button class="botao-cta" onclick="confirmarPagamento()">
          JÁ FIZ O PAGAMENTO
        </button>
      </div>
    </section>

    <!-- SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <!-- JS -->
    <script src="js/checkout.js"></script>
  </body>
</html>
